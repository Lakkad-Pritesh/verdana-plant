<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Stem -->
  <rect x="95" y="100" width="10" height="100" fill="green" />
  <!-- Green leaves -->
  <ellipse cx="100" cy="120" rx="30" ry="15" fill="darkgreen" transform="rotate(-30 100 120)" />
  <ellipse cx="100" cy="120" rx="30" ry="15" fill="darkgreen" transform="rotate(30 100 120)" />
  <!-- Red bracts -->
  <ellipse cx="100" cy="80" rx="40" ry="20" fill="red" transform="rotate(0 100 80)" />
  <ellipse cx="100" cy="80" rx="40" ry="20" fill="red" transform="rotate(45 100 80)" />
  <ellipse cx="100" cy="80" rx="40" ry="20" fill="red" transform="rotate(90 100 80)" />
  <ellipse cx="100" cy="80" rx="40" ry="20" fill="red" transform="rotate(135 100 80)" />
  <!-- Center -->
  <circle cx="100" cy="80" r="10" fill="yellow" />
</svg>